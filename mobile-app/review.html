<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e17">
<title>复盘与AI - 中证500</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e17;color:#e6edf3;min-height:100vh;-webkit-tap-highlight-color:transparent}
.header{position:sticky;top:0;z-index:50;background:rgba(10,14,23,0.95);backdrop-filter:blur(12px);border-bottom:1px solid #1e293b;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:16px;font-weight:600;color:#e6edf3}
.nav{display:flex;gap:8px}
.nav a{color:#64748b;font-size:13px;text-decoration:none;padding:4px 8px;border-radius:4px;transition:all .2s}
.nav a.active{color:#22d3ee;background:rgba(34,211,238,0.1)}
.content{padding:16px}
.card{background:#111827;border:1px solid #1e293b;border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{font-size:12px;color:#64748b;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi-item{background:#0d1117;border:1px solid #1e293b;border-radius:8px;padding:12px;text-align:center}
.kpi-value{font-size:20px;font-weight:700}
.kpi-label{font-size:11px;color:#64748b;margin-top:4px}
.kpi-green{color:#3fb950}
.kpi-red{color:#f85149}
.chart-container{position:relative;width:100%;height:200px;margin:8px 0}
.chart-container canvas{width:100%!important;height:100%!important}
.signal-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(30,41,59,0.5)}
.signal-name{font-size:13px;font-weight:500}
.signal-detail{font-size:12px;color:#8b949e;text-align:right}
.data-table{width:100%;font-size:11px;border-collapse:collapse}
.data-table th{text-align:left;padding:5px 3px;color:#64748b;border-bottom:1px solid #1e293b;font-weight:500}
.data-table td{padding:5px 3px;border-bottom:1px solid rgba(30,41,59,0.5)}
.loading{text-align:center;padding:40px;color:#64748b}
.loading-spinner{display:inline-block;width:24px;height:24px;border:2px solid #1e293b;border-top-color:#22d3ee;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
<h1>复盘与AI</h1>
<div class="nav">
<a href="index.html">主页</a>
<a href="strategy-debug.html">策略</a>
<a href="review.html" class="active">复盘</a>
</div>
</div>

<div class="content">
<div id="loadingArea" class="loading"><div class="loading-spinner"></div><p style="margin-top:12px">加载数据...</p></div>
<div id="mainContent" style="display:none">
<div class="card">
<div class="card-title">策略KPI</div>
<div class="kpi-grid" id="kpiGrid"></div>
</div>
<div class="card">
<div class="card-title">净值曲线</div>
<div class="chart-container"><canvas id="navChart"></canvas></div>
</div>
<div class="card">
<div class="card-title">Alpha曲线</div>
<div class="chart-container"><canvas id="alphaChart"></canvas></div>
</div>
<div class="card">
<div class="card-title">信号分布</div>
<div id="signalDist"></div>
</div>
<div class="card">
<div class="card-title">近20日记录</div>
<div style="overflow-x:auto"><table class="data-table" id="recentTable"></table></div>
</div>
</div>
</div>

<script src="vendor/papaparse.min.js"></script>
<script src="strategy-common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
function loadData(){
fetch('zz500_factors.csv').then(function(r){return r.text()}).then(function(csv){
var parsed=Papa.parse(csv,{header:true,skipEmptyLines:true});
var data=StrategyCommon.processRealData(parsed.data);
var kpi=StrategyCommon.calcKPI(data);
renderPage(data,kpi);
}).catch(function(e){
document.getElementById('loadingArea').innerHTML='<div style="color:#f85149;text-align:center;padding:20px">加载失败: '+e.message+'</div>';
});
}

function renderPage(data,kpi){
document.getElementById('loadingArea').style.display='none';
document.getElementById('mainContent').style.display='block';

var grid=document.getElementById('kpiGrid');
grid.innerHTML=
'<div class="kpi-item"><div class="kpi-value '+(kpi.acc5>=50?'kpi-green':'kpi-red')+'">'+kpi.acc5.toFixed(1)+'%</div><div class="kpi-label">5日准确率</div></div>'+
'<div class="kpi-item"><div class="kpi-value '+(kpi.acc10>=50?'kpi-green':'kpi-red')+'">'+kpi.acc10.toFixed(1)+'%</div><div class="kpi-label">10日准确率</div></div>'+
'<div class="kpi-item"><div class="kpi-value '+(kpi.acc20>=50?'kpi-green':'kpi-red')+'">'+kpi.acc20.toFixed(1)+'%</div><div class="kpi-label">20日准确率</div></div>'+
'<div class="kpi-item"><div class="kpi-value '+(kpi.accWeighted>=50?'kpi-green':'kpi-red')+'">'+kpi.accWeighted.toFixed(1)+'%</div><div class="kpi-label">加权准确率</div></div>'+
'<div class="kpi-item"><div class="kpi-value '+(kpi.annReturn>=0?'kpi-green':'kpi-red')+'">'+kpi.annReturn.toFixed(2)+'%</div><div class="kpi-label">年化收益</div></div>'+
'<div class="kpi-item"><div class="kpi-value" style="color:#8b949e">'+kpi.totalDays+'</div><div class="kpi-label">数据天数</div></div>';

var last200=data.slice(-200);
var labels=last200.map(function(d){return d.date});
var navs=last200.map(function(d){return d.nav});
var alphas=last200.map(function(d){return d.alpha});

new Chart(document.getElementById('navChart').getContext('2d'),{type:'line',data:{labels:labels,datasets:[{label:'净值',data:navs,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.1)',fill:true,tension:0.1,pointRadius:0,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#484f58',font:{size:9},maxTicksLimit:5},grid:{color:'#1e293b'}},y:{ticks:{color:'#484f58',font:{size:9}},grid:{color:'#1e293b'}}}}});

new Chart(document.getElementById('alphaChart').getContext('2d'),{type:'line',data:{labels:labels,datasets:[{label:'Alpha',data:alphas,borderColor:'#a855f7',backgroundColor:'rgba(168,85,247,0.1)',fill:true,tension:0.1,pointRadius:0,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#484f58',font:{size:9},maxTicksLimit:5},grid:{color:'#1e293b'}},y:{ticks:{color:'#484f58',font:{size:9}},grid:{color:'#1e293b'}}}}});

var distEl=document.getElementById('signalDist');
var html='';
StrategyCommon.SIGNALS.forEach(function(s){
var st=kpi.signalStats[s.name];
if(st&&st.triggers>0){
html+='<div class="signal-item"><span class="signal-name" style="color:'+s.color+'">'+s.name+'</span><span class="signal-detail">'+st.triggers+'次 / 准确率'+(st.waCount>0?(st.waSum/st.waCount*100).toFixed(1):'--')+'%</span></div>';
}
});
distEl.innerHTML=html;

var table=document.getElementById('recentTable');
var recent=data.slice(-20).reverse();
var th='<thead><tr><th>日期</th><th>收盘</th><th>信号</th><th>5日</th><th>10日</th><th>20日</th></tr></thead>';
var tb='<tbody>';
recent.forEach(function(r){
tb+='<tr><td>'+r.date+'</td><td>'+r.close.toFixed(2)+'</td>'+
'<td style="color:'+r.signal.color+'">'+r.signal.name+'</td>'+
'<td style="color:'+(r.j5>=0?'#3fb950':'#f85149')+'">'+(r.j5!==null?(r.j5>=0?'✓':'✕'):'--')+'</td>'+
'<td style="color:'+(r.j10>=0?'#3fb950':'#f85149')+'">'+(r.j10!==null?(r.j10>=0?'✓':'✕'):'--')+'</td>'+
'<td style="color:'+(r.j20>=0?'#3fb950':'#f85149')+'">'+(r.j20!==null?(r.j20>=0?'✓':'✕'):'--')+'</td></tr>';
});
tb+='</tbody>';
table.innerHTML=th+tb;
}

loadData();
</script>
</body>
</html>
