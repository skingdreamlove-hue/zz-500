<script type="text/babel">
const{useState,useEffect,useMemo,useCallback,useRef}=React;
const{LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Legend,ReferenceLine}=Recharts;

const SIGNAL_DEFS=[
{name:'清仓-跌破MA',color:'#22c55e',defaultThreshold:1.0,desc:'跌破MA'},
{name:'满仓-涨破5%',color:'#a855f7',defaultThreshold:1.05,desc:'涨破MA×1.05'},
{name:'满仓-量价共振',color:'#ef4444',defaultThreshold:1.5,desc:'沪深300强+放量'},
{name:'满仓-大盘撑腰',color:'#3b82f6',defaultThreshold:1.01,desc:'沪深300强+突破1%'},
{name:'底仓-逆市试错',color:'#f97316',defaultThreshold:1.01,desc:'弱市+突破1%'},
{name:'观望-无效突破',color:'#6b7280',defaultThreshold:1.0,desc:'站上MA<1%'}
];

const DEFAULT_WEIGHTS={fwd5:20,fwd10:30,fwd20:50};
const DEFAULT_THRESHOLDS={fwd5:1.0,fwd10:2.0,fwd20:4.0};
const DEFAULT_SIGNALS={};
SIGNAL_DEFS.forEach(s=>{DEFAULT_SIGNALS[s.name]={enabled:true,threshold:s.defaultThreshold}});
const DEFAULT_SIGNAL_ORDER=SIGNAL_DEFS.map(s=>s.name);

const SIGNALS=[
{name:'清仓-跌破MA',position:0,type:'defense',color:'#22c55e'},
{name:'满仓-涨破5%',position:100,type:'attack',color:'#ef4444'},
{name:'满仓-量价共振',position:100,type:'attack',color:'#ef4444'},
{name:'满仓-大盘撑腰',position:100,type:'attack',color:'#ef4444'},
{name:'底仓-逆市试错',position:10,type:'attack',color:'#f97316'},
{name:'观望-无效突破',position:0,type:'defense',color:'#6b7280'}
];
const SIGNAL_MAP={};
SIGNALS.forEach(s=>{SIGNAL_MAP[s.name]=s});

function judge(signalName,fwdReturn,horizon){
if(fwdReturn===null)return'pending';
const threshold=DEFAULT_THRESHOLDS[horizon];
const isAttack=SIGNAL_MAP[signalName].type==='attack';
if(isAttack){
if(fwdReturn>threshold)return'pass';
if(fwdReturn<-threshold)return'fail';
return'neutral';
}else{
if(fwdReturn<-threshold)return'pass';
if(fwdReturn>threshold)return'fail';
return'neutral';
}
}

function judgeScore(j){
if(j==='pass')return 1;
if(j==='neutral')return 0.5;
if(j==='fail')return 0;
return null;
}

function weightedAccuracy(j5,j10,j20){
const s5=judgeScore(j5);
const s10=judgeScore(j10);
const s20=judgeScore(j20);
if(s5===null||s10===null||s20===null)return null;
return s5*0.2+s10*0.3+s20*0.5;
}

function calcMA(data,period,key){
key=key||'close';
const result=new Array(data.length).fill(null);
for(let i=period-1;i<data.length;i++){
let sum=0;
for(let j=i-period+1;j<=i;j++){
sum+=parseFloat(data[j][key]);
}
result[i]=sum/period;
}
return result;
}

function calcHs300Strong(data,index,confirmDays,hs300MaValues){
if(confirmDays<=1){
const hs300Close=parseFloat(data[index].hs300_close);
const hs300MA=hs300MaValues[index];
return!isNaN(hs300Close)&&hs300MA!==null&&hs300Close>hs300MA;
}
for(let d=0;d<confirmDays;d++){
const idx=index-d;
if(idx<0)return false;
const hs300Close=parseFloat(data[idx].hs300_close);
const hs300MA=hs300MaValues[idx];
if(isNaN(hs300Close)||hs300MA===null||hs300Close<=hs300MA)return false;
}
return true;
}

function getSignal(row){
const close=parseFloat(row.close);
const ma20=parseFloat(row.zz500_MA20);
const isHs300Strong=row.is_hs300_strong==='True';
const isVolumeSurge=row.is_volume_surge==='True';
if(close<ma20)return SIGNAL_MAP['清仓-跌破MA'];
if(close>ma20*1.05)return SIGNAL_MAP['满仓-涨破5%'];
if(isHs300Strong&&isVolumeSurge)return SIGNAL_MAP['满仓-量价共振'];
if(isHs300Strong&&close>ma20*1.01)return SIGNAL_MAP['满仓-大盘撑腰'];
if(!isHs300Strong&&close>ma20*1.01)return SIGNAL_MAP['底仓-逆市试错'];
return SIGNAL_MAP['观望-无效突破'];
}

function processRealData(rawData,startDate,endDate){
const filtered=rawData.filter(r=>r.zz500_MA20&&r.zz500_MA20.trim()!=='');
const dateFiltered=filtered.filter(r=>{
if(startDate&&r.date<startDate)return false;
if(endDate&&r.date>endDate)return false;
return true;
});
const data=dateFiltered.map(r=>({...r,signal:getSignal(r)}));
let nav=1.0,benchNav=1.0,pos=0;
for(let i=0;i<data.length;i++){
const c=parseFloat(data[i].close);
const pc=i>0?parseFloat(data[i-1].close):c;
const sr=i>0?(c/pc-1):0;
const dr=pos*sr;
nav*=(1+dr);
benchNav*=(1+sr);
pos=data[i].signal.position/100;
data[i].nav=nav;
data[i].benchNav=benchNav;
}
for(let i=0;i<data.length;i++){
const c=parseFloat(data[i].close);
data[i].fwd5=i+5<data.length?(parseFloat(data[i+5].close)/c-1)*100:null;
data[i].fwd10=i+10<data.length?(parseFloat(data[i+10].close)/c-1)*100:null;
data[i].fwd20=i+20<data.length?(parseFloat(data[i+20].close)/c-1)*100:null;
const j5=judge(data[i].signal.name,data[i].fwd5,'fwd5');
const j10=judge(data[i].signal.name,data[i].fwd10,'fwd10');
const j20=judge(data[i].signal.name,data[i].fwd20,'fwd20');
data[i].j5=j5;
data[i].j10=j10;
data[i].j20=j20;
data[i].wa=weightedAccuracy(j5,j10,j20);
}
return data;
}

function getSignalWithConfig(row,data,index,signalConfig,signalOrder,maValues,hs300MaValues,bottomPosition,hs300ConfirmDays,maPeriod){
const close=parseFloat(row.close);
const ma=maValues[index];
if(ma===null)return SIGNAL_MAP['观望-无效突破'];
const isHs300Strong=(maPeriod===20&&hs300ConfirmDays===1)?row.is_hs300_strong==='True':calcHs300Strong(data,index,hs300ConfirmDays,hs300MaValues);
const isVolumeSurge=row.is_volume_surge==='True';
for(const signalName of signalOrder){
const cfg=signalConfig[signalName];
if(!cfg||!cfg.enabled)continue;
const threshold=cfg.threshold||(SIGNAL_DEFS.find(d=>d.name===signalName)||{}).defaultThreshold||1.0;
if(signalName==='清仓-跌破MA'&&close<ma*threshold){
return{...SIGNAL_MAP['清仓-跌破MA']};
}
if(signalName==='满仓-涨破5%'&&close>ma*threshold){
return{...SIGNAL_MAP['满仓-涨破5%']};
}
if(signalName==='满仓-量价共振'&&isHs300Strong&&isVolumeSurge){
return{...SIGNAL_MAP['满仓-量价共振']};
}
if(signalName==='满仓-大盘撑腰'&&isHs300Strong&&close>ma*threshold){
return{...SIGNAL_MAP['满仓-大盘撑腰']};
}
if(signalName==='底仓-逆市试错'&&!isHs300Strong&&close>ma*threshold){
return{...SIGNAL_MAP['底仓-逆市试错'],position:bottomPosition};
}
if(signalName==='观望-无效突破'){
return{...SIGNAL_MAP['观望-无效突破']};
}
}
return{...SIGNAL_MAP['观望-无效突破']};
}

function processRealDataWithConfig(rawData,signalConfig,customWeights,startDate,endDate,maPeriod,bottomPosition,hs300ConfirmDays,bufferEnabled,signalOrder){
const filtered=rawData.filter(r=>r.close&&r.close.trim()!=='');
const maValues=calcMA(filtered,maPeriod,'close');
const hs300MaValues=calcMA(filtered,maPeriod,'hs300_close');
const validIdx=[];
for(let i=0;i<filtered.length;i++){
const r=filtered[i];
if(maValues[i]===null)continue;
if(startDate&&r.date<startDate)continue;
if(endDate&&r.date>endDate)continue;
validIdx.push(i);
}
const data=validIdx.map(i=>({...filtered[i],ma:maValues[i]}));
const validMaValues=validIdx.map(i=>maValues[i]);
const validHs300MaValues=validIdx.map(i=>hs300MaValues[i]);
data.forEach((r,i)=>{
r.signal=getSignalWithConfig(r,data,i,signalConfig,signalOrder,validMaValues,validHs300MaValues,bottomPosition,hs300ConfirmDays,maPeriod);
});
let nav=1.0,benchNav=1.0,pos=0;
for(let i=0;i<data.length;i++){
const c=parseFloat(data[i].close);
const pc=i>0?parseFloat(data[i-1].close):c;
const sr=i>0?(c/pc-1):0;
let newPos=data[i].signal.position/100;
if(bufferEnabled&&pos>=1.0&&newPos>0&&newPos<1.0){
newPos=0;
}
const dr=pos*sr;
nav*=(1+dr);
benchNav*=(1+sr);
pos=newPos;
data[i].nav=nav;
data[i].benchNav=benchNav;
}
const w5=(customWeights&&customWeights.fwd5!=null?customWeights.fwd5:20)/100;
const w10=(customWeights&&customWeights.fwd10!=null?customWeights.fwd10:30)/100;
const w20=(customWeights&&customWeights.fwd20!=null?customWeights.fwd20:50)/100;
for(let i=0;i<data.length;i++){
const c=parseFloat(data[i].close);
data[i].fwd5=i+5<data.length?(parseFloat(data[i+5].close)/c-1)*100:null;
data[i].fwd10=i+10<data.length?(parseFloat(data[i+10].close)/c-1)*100:null;
data[i].fwd20=i+20<data.length?(parseFloat(data[i+20].close)/c-1)*100:null;
const j5=judge(data[i].signal.name,data[i].fwd5,'fwd5');
const j10=judge(data[i].signal.name,data[i].fwd10,'fwd10');
const j20=judge(data[i].signal.name,data[i].fwd20,'fwd20');
data[i].j5=j5;
data[i].j10=j10;
data[i].j20=j20;
const s5=judgeScore(j5);
const s10=judgeScore(j10);
const s20=judgeScore(j20);
data[i].wa=(s5!==null&&s10!==null&&s20!==null)?s5*w5+s10*w10+s20*w20:null;
}
return data;
}

function toChartData(processedData){
return processedData.map(r=>({
date:r.date,
nav:r.nav,
cumRet:+((r.nav-1)*100).toFixed(2),
wa:r.wa!==null?+(r.wa*100).toFixed(1):null
}));
}

function generateTestData(rawData,weights,signals,startDate,endDate,maPeriod,bottomPosition,hs300ConfirmDays,bufferEnabled,signalOrder){
const processed=processRealDataWithConfig(rawData,signals,weights,startDate,endDate,maPeriod,bottomPosition,hs300ConfirmDays,bufferEnabled,signalOrder);
return toChartData(processed);
}

<div className="sticky top-0 z-50 bg-[#0a0e17]/95 backdrop-blur border-b border-[#1e293b] px-6 py-3 flex items-center justify-between">

function WeightSlider({label,value,onChange,color}){
return(

return(
<div className={`signal-row ${isDragging?'dragging':''}`} {...dragHandleProps}>
<span className="drag-handle">⠿</span>
<div className="toggle-switch" style={config.enabled?{background:def.color}:{background:'#1e293b'}}
onClick={()=>onToggle(def.name,!config.enabled)}>
{config.enabled&&<style>{`.toggle-switch[style*="${def.color}"]::after{transform:translateX(18px)}`}</style>}
</div>
<div className="flex-1 min-w-0">
<div className="flex items-center gap-2">

{config.enabled&&(
<div className="flex items-center gap-2 mt-1.5">
<span className="text-xs text-gray-500">阈值</span>
<input type="number" step="0.01" min="0" max="10" value={config.threshold}
className="w-16 bg-[#0a0e17] border border-[#1e293b] rounded px-2 py-0.5 text-xs text-gray-300 focus:border-blue-500 focus:outline-none"
onChange={e=>onThresholdChange(def.name,+e.target.value)}/>

</div>
</div>

}

function ConfigPanel({weights,onWeightChange,signals,onSignalToggle,onSignalThresholdChange,
strategyName,onStrategyNameChange,testing,onStartStop,canReplace,onReplace,
startDate,onStartDateChange,endDate,onEndDateChange,
bottomPosition,onBottomPositionChange,
hs300ConfirmDays,onHs300ConfirmDaysChange,
bufferEnabled,onBufferEnabledChange,
maPeriod,onMaPeriodChange,
signalOrder,onSignalOrderChange}){

const[dragIdx,setDragIdx]=useState(null);
const[overIdx,setOverIdx]=useState(null);

const totalWeight=weights.fwd5+weights.fwd10+weights.fwd20;
const isValid=totalWeight===100;

const handleDragStart=(e,idx)=>{
setDragIdx(idx);
e.dataTransfer.effectAllowed='move';
};
const handleDragOver=(e,idx)=>{
e.preventDefault();
setOverIdx(idx);
};
const handleDragEnd=()=>{
if(dragIdx!==null&&overIdx!==null&&dragIdx!==overIdx){
const newOrder=[...signalOrder];
const[removed]=newOrder.splice(dragIdx,1);
newOrder.splice(overIdx,0,removed);
onSignalOrderChange(newOrder);
}
setDragIdx(null);
setOverIdx(null);
};

const orderedSignalDefs=signalOrder.map(name=>SIGNAL_DEFS.find(d=>d.name===name)).filter(Boolean);

return(
<div className="panel h-full">
<div className="panel-header">
<span className="text-sm font-semibold text-gray-300">策略参数配置</span>
{testing&&<span className="flex items-center gap-1.5 text-xs text-green-400"><span className="w-2 h-2 rounded-full bg-green-400 pulse-dot"></span>测试运行中</span>}
</div>
<div className="panel-body overflow-y-auto" style={{maxHeight:'calc(100vh - 120px)'}}>
<div className="mb-6">
<div className="text-xs text-gray-500 uppercase tracking-wider mb-3">回测区间</div>
<div className="flex items-center gap-2">
<input type="date" value={startDate} onChange={e=>onStartDateChange(e.target.value)} min="2015-05-01"
className="flex-1 bg-[#0a0e17] border border-[#1e293b] rounded px-2 py-1.5 text-xs text-gray-300 focus:border-blue-500 focus:outline-none"/>
<span className="text-gray-600 text-xs">至</span>
<input type="date" value={endDate} onChange={e=>onEndDateChange(e.target.value)} min="2015-05-01"
className="flex-1 bg-[#0a0e17] border border-[#1e293b] rounded px-2 py-1.5 text-xs text-gray-300 focus:border-blue-500 focus:outline-none"/>
</div>
</div>

<div className="mb-6">
<div className="text-xs text-gray-500 uppercase tracking-wider mb-3">MA均线周期</div>
<div className="flex gap-2">
{[10,15,20,30].map(p=>(
<button key={p} className={`ma-btn ${maPeriod===p?'active':''}`} onClick={()=>onMaPeriodChange(p)}>MA{p}</button>
))}

function CumulativeReturnChart({baselineData,testData,testing}){
const chartData=baselineData.map((b,i)=>{
const t=testData[i];
return{date:b.date,baseline:b.cumRet,test:t?t.cumRet:null};
});

const baseCurrent=baselineData.length>0?baselineData[baselineData.length-1].cumRet:0;
const testCurrent=testData.length>0?testData[testData.length-1].cumRet:0;
const baseMax=Math.max(...baselineData.map(d=>d.cumRet));
const testMax=testData.length>0?Math.max(...testData.map(d=>d.cumRet)):0;
const diff=testing?(testCurrent-baseCurrent):0;

const minV=Math.min(...chartData.map(d=>Math.min(d.baseline,d.test||0)));
const maxV=Math.max(...chartData.map(d=>Math.max(d.baseline,d.test||0)));
const pad=(maxV-minV)*0.1||5;

return(
<div className="panel mb-6">
<div className="panel-header">
<span className="text-sm font-semibold text-gray-300">累计收益对比曲线</span>
</div>
<div className="panel-body">

<div style={{height:260}}>
<ResponsiveContainer width="100%" height="100%">
<LineChart data={chartData} margin={{top:10,right:30,left:10,bottom:0}}>
<CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
<XAxis dataKey="date" tick={{fontSize:10,fill:'#64748b'}} interval={Math.floor(chartData.length/6)}/>
<YAxis domain={[minV-pad,maxV+pad]} tick={{fontSize:10,fill:'#64748b'}} tickFormatter={v=>v.toFixed(1)+'%'}/>
<Tooltip content={({active,payload})=>{
if(!active||!payload||!payload.length)return null;
const d=payload[0].payload;
return(
<div style={{background:'#1e293b',border:'1px solid #334155',borderRadius:8,padding:12,fontSize:12,boxShadow:'0 4px 12px rgba(0,0,0,0.5)'}}>
<div style={{color:'#9ca3af',marginBottom:6}}>{d.date}</div>

{d.test!==null&&<div style={{display:'flex',alignItems:'center',gap:8}}><span style={{width:8,height:8,borderRadius:'50%',background:'#fbbf24',display:'inline-block'}}></span><span style={{color:'#9ca3af'}}>测试策略</span><span style={{color:'#fff',fontWeight:600}}>{d.test.toFixed(2)}%</span></div>}
</div>
);
}}/>
<Legend payload={[{value:'现有策略',type:'line',color:'#22d3ee'},{value:'测试策略',type:'line',color:'#fbbf24'}]}/>
<Line type="monotone" dataKey="baseline" stroke="#22d3ee" strokeWidth={2} dot={false} name="现有策略"/>
{testing&&<Line type="monotone" dataKey="test" stroke="#fbbf24" strokeWidth={2} dot={false} strokeDasharray="6 3" name="测试策略"/>}
</LineChart>
</ResponsiveContainer>
</div>
</div>

);

function AccuracyChart({baselineData,testData,testing}){
const window=20;
function rollingWA(data,win){
const result=[];
for(let i=0;i<data.length;i++){
if(i<win-1){result.push({idx:i+1,wa:null});continue}
const slice=data.slice(i-win+1,i+1);
const avg=slice.reduce((a,b)=>a+b.wa,0)/win;
result.push({idx:i+1,wa:+avg.toFixed(1)});
}
return result;
}
const baseRolling=rollingWA(baselineData,window);
const testRolling=testing?rollingWA(testData,window):[];
const chartData=baseRolling.map((b,i)=>{
const t=testRolling[i];
return{idx:b.idx,baseline:b.wa,test:t?t.wa:null};
}).filter(d=>d.baseline!==null);

const baseVals=chartData.map(d=>d.baseline).filter(v=>v!==null);
const testVals=chartData.map(d=>d.test).filter(v=>v!==null);
const baseCurrent=baseVals.length>0?baseVals[baseVals.length-1]:0;
const testCurrent=testVals.length>0?testVals[testVals.length-1]:0;
const baseMax=baseVals.length>0?Math.max(...baseVals):0;
const testMax=testVals.length>0?Math.max(...testVals):0;
const diff=testing?(testCurrent-baseCurrent):0;

const minV=Math.min(...baseVals,...testVals);
const maxV=Math.max(...baseVals,...testVals);
const padV=(maxV-minV)*0.1||5;

return(
<div className="panel">
<div className="panel-header">
<span className="text-sm font-semibold text-gray-300">准确率对比曲线（滚动{window}次信号）</span>
</div>
<div className="panel-body">
<ChartSummary label="测试策略" current={testing?testCurrent:0} max={testing?testMax:0} diff={diff} unit="%"/>
<div style={{height:260}}>
<ResponsiveContainer width="100%" height="100%">
<LineChart data={chartData} margin={{top:10,right:30,left:10,bottom:0}}>
<CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
<XAxis dataKey="idx" tick={{fontSize:10,fill:'#64748b'}} label={{value:'信号次数',position:'insideBottomRight',offset:-5,fontSize:10,fill:'#475569'}}/>
<YAxis domain={[Math.min(minV-padV,0),maxV+padV]} tick={{fontSize:10,fill:'#64748b'}} tickFormatter={v=>v.toFixed(0)+'%'}/>
<Tooltip content={({active,payload})=>{
if(!active||!payload||!payload.length)return null;
const d=payload[0].payload;
return(
<div style={{background:'#1e293b',border:'1px solid #334155',borderRadius:8,padding:12,fontSize:12,boxShadow:'0 4px 12px rgba(0,0,0,0.5)'}}>
<div style={{color:'#9ca3af',marginBottom:6}}>第 {d.idx} 次信号</div>
<div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}><span style={{width:8,height:8,borderRadius:'50%',background:'#22d3ee',display:'inline-block'}}></span><span style={{color:'#9ca3af'}}>现有策略</span><span style={{color:'#fff',fontWeight:600}}>{d.baseline?d.baseline.toFixed(1):'--'}%</span></div>
{d.test!==null&&<div style={{display:'flex',alignItems:'center',gap:8}}><span style={{width:8,height:8,borderRadius:'50%',background:'#fbbf24',display:'inline-block'}}></span><span style={{color:'#9ca3af'}}>测试策略</span><span style={{color:'#fff',fontWeight:600}}>{d.test.toFixed(1)}%</span></div>}
</div>
);
}}/>
<Legend payload={[{value:'现有策略',type:'line',color:'#22d3ee'},{value:'测试策略',type:'line',color:'#fbbf24'}]}/>
<ReferenceLine y={50} stroke="#334155" strokeDasharray="3 3"/>
<Line type="monotone" dataKey="baseline" stroke="#22d3ee" strokeWidth={2} dot={false} name="现有策略"/>
{testing&&<Line type="monotone" dataKey="test" stroke="#fbbf24" strokeWidth={2} dot={false} strokeDasharray="6 3" name="测试策略"/>}
</LineChart>
</ResponsiveContainer>
</div>
</div>
</div>
);
}

<div className="grid grid-cols-2 gap-4 mb-4">
<div className="panel"><div className="panel-header"><span className="text-sm font-semibold text-gray-300">净值曲线</span></div><div className="panel-body" style={{height:280}}><canvas ref={equityChartRef}></canvas></div></div>
<div className="panel"><div className="panel-header"><span className="text-sm font-semibold text-gray-300">市场状态分布</span></div><div className="panel-body" style={{height:280}}><canvas ref={statusChartRef}></canvas></div></div>
</div>
{report.monthly_returns&&(
<div className="panel mb-4">
<div className="panel-header"><span className="text-sm font-semibold text-gray-300">月度收益率</span></div>
<div className="panel-body"><div className="grid grid-cols-6 gap-1">
{Object.entries(report.monthly_returns).map(([k,v])=>{
const c=v>=0?'#22c55e':'#ef4444';
return<div key={k} className="text-center p-2 rounded" style={{background:v>=0?'rgba(34,197,94,0.08)':'rgba(239,68,68,0.08)'}}>
<div className="text-xs text-gray-500">{k}</div>
<div className="text-sm font-bold" style={{color:c}}>{v>=0?'+':''}{v.toFixed(2)}%</div>
</div>;
})}
</div></div>
</div>
)}
{report.yearly_stats&&(
<div className="panel mb-4">
<div className="panel-header"><span className="text-sm font-semibold text-gray-300">年度统计</span></div>
<div className="panel-body overflow-x-auto">
<table className="w-full text-sm">
<thead><tr className="border-b border-[#1e293b]">
<th className="py-2 px-3 text-gray-500 text-xs text-left">年度</th>
<th className="py-2 px-3 text-gray-500 text-xs text-left">收益率</th>
<th className="py-2 px-3 text-gray-500 text-xs text-left">日胜率</th>
<th className="py-2 px-3 text-gray-500 text-xs text-left">最大回撤</th>
<th className="py-2 px-3 text-gray-500 text-xs text-left">交易日</th>
</tr></thead>
<tbody>
{report.yearly_stats.map((y,i)=>{
const rc=y.return>=0?'#22c55e':'#ef4444';
const wc=y.win_rate>=50?'#22c55e':'#d29922';
return<tr key={i} className="border-b border-[#1e293b]/30">
<td className="py-2 px-3 font-bold">{y.year}</td>
<td className="py-2 px-3 font-bold" style={{color:rc}}>{y.return>=0?'+':''}{y.return.toFixed(2)}%</td>
<td className="py-2 px-3" style={{color:wc}}>{y.win_rate.toFixed(1)}%</td>
<td className="py-2 px-3 text-red-400">{y.max_dd.toFixed(2)}%</td>
<td className="py-2 px-3 text-gray-400">{y.days}天</td>
</tr>;
})}
</tbody>
</table>
</div>
</div>
)}
</div>
)}
</div>
);
}

function ConfirmModal({open,onConfirm,onCancel,strategyName}){
const confirmBtnRef=useRef(null);
useEffect(()=>{
if(open){
setTimeout(()=>{if(confirmBtnRef.current)confirmBtnRef.current.focus()},50);
}
},[open]);
useEffect(()=>{
if(!open)return;
const handleKeyDown=(e)=>{
if(e.key==='Escape')onCancel();
};
document.addEventListener('keydown',handleKeyDown);
return()=>document.removeEventListener('keydown',handleKeyDown);
},[open,onCancel]);
if(!open)return null;
return(
<div className="modal-overlay" onClick={onCancel}>
<div className="modal-box" onClick={e=>e.stopPropagation()}>
<div className="text-lg font-bold text-white mb-3">确认替换策略</div>
<div className="text-sm text-gray-400 mb-2">
确定要将当前运行策略替换为 <span className="text-amber-400 font-semibold">{strategyName}</span> 吗？
</div>
<div className="text-xs text-gray-500 mb-6">此操作将更新策略配置参数，并记录到修改日志中。</div>
<div className="flex justify-end gap-3">
<button className="px-4 py-2 rounded-lg text-sm bg-[#0a0e17] text-gray-400 border border-[#1e293b] hover:border-gray-500 transition-colors" onClick={onCancel}>取消</button>
<button ref={confirmBtnRef} className="px-4 py-2 rounded-lg text-sm bg-amber-500 text-white font-semibold hover:bg-amber-400 transition-colors" onClick={onConfirm}>确认替换</button>
</div>
</div>
</div>
);
}

function App(){
const[rawData,setRawData]=useState(null);
const[loading,setLoading]=useState(true);
const[error,setError]=useState(null);
const[weights,setWeights]=useState({...DEFAULT_WEIGHTS});
const[signals,setSignals]=useState(JSON.parse(JSON.stringify(DEFAULT_SIGNALS)));
const[strategyName,setStrategyName]=useState('');
const[testing,setTesting]=useState(false);
const[showConfirm,setShowConfirm]=useState(false);
const[baselineData,setBaselineData]=useState([]);
const[testData,setTestData]=useState([]);
const[startDate,setStartDate]=useState('2015-05-01');
const[endDate,setEndDate]=useState('');
const[bottomPosition,setBottomPosition]=useState(10);
const[hs300ConfirmDays,setHs300ConfirmDays]=useState(1);
const[bufferEnabled,setBufferEnabled]=useState(false);
const[maPeriod,setMaPeriod]=useState(20);
const[signalOrder,setSignalOrder]=useState([...DEFAULT_SIGNAL_ORDER]);
const[logs,setLogs]=useState([
{version:'V9.08',effectiveDate:'2026-04-01',paramSummary:'初始版本，5日权重20%、10日权重30%、20日权重50%，六信号全开',replaceReason:'基线版本',status:'运行中',note:''}
]);
const[backtestOpen,setBacktestOpen]=useState(false);
const[btParams,setBtParams]=useState({start_date:'2020-01-02',end_date:'2026-04-30',initial_capital:100000,initial_position_pct:50,cash_yield:2,rebalance_interval:1,monthly_sip:0});
const[btRunning,setBtRunning]=useState(false);
const[btProgress,setBtProgress]=useState(0);
const[btReport,setBtReport]=useState(null);
const[btTaskId,setBtTaskId]=useState(null);

const loadCSV=useCallback(async()=>{
let csvText;
if(window.electronAPI&&window.electronAPI.readFile){
csvText=await window.electronAPI.readFile('zz500_factors.csv');
}else{
const resp=await fetch('./zz500_factors.csv');
csvText=await resp.text();
}
const parsed=Papa.parse(csvText,{header:true,skipEmptyLines:true});
setRawData(parsed.data);
const processed=processRealData(parsed.data,'2015-05-01','');
setBaselineData(toChartData(processed));
},[]);

useEffect(()=>{
(async()=>{
try{
await loadCSV();
}catch(e){setError(e.message)}finally{setLoading(false)}
})();
},[loadCSV]);

useEffect(()=>{
const onVisible=()=>{
if(document.visibilityState==='visible'&&rawData){
loadCSV().catch(()=>{});
}
};
document.addEventListener('visibilitychange',onVisible);
return()=>document.removeEventListener('visibilitychange',onVisible);
},[rawData,loadCSV]);

useEffect(()=>{
if(!rawData)return;
const processed=processRealData(rawData,startDate,endDate);
setBaselineData(toChartData(processed));
if(testing){
const newTestData=generateTestData(rawData,weights,signals,startDate,endDate,maPeriod,bottomPosition,hs300ConfirmDays,bufferEnabled,signalOrder);
setTestData(newTestData);
}
},[startDate,endDate]);

const handleWeightChange=useCallback((key,val)=>{
setWeights(prev=>({...prev,[key]:val}));
},[]);

const handleSignalToggle=useCallback((name,enabled)=>{
setSignals(prev=>({...prev,[name]:{...prev[name],enabled}}));
},[]);

const handleSignalThreshold=useCallback((name,threshold)=>{
setSignals(prev=>({...prev,[name]:{...prev[name],threshold}}));
},[]);

const canReplace=useMemo(()=>{
if(!testing||testData.length<20)return false;
const baseLast=baselineData[baselineData.length-1];
const testLast=testData[testData.length-1];
return testLast.cumRet>baseLast.cumRet||testLast.wa>baseLast.wa;
},[testing,testData,baselineData]);

const handleStartStop=useCallback(()=>{
if(testing){
setTesting(false);
setTestData([]);
}else{
if(!rawData)return;
const newTestData=generateTestData(rawData,weights,signals,startDate,endDate,maPeriod,bottomPosition,hs300ConfirmDays,bufferEnabled,signalOrder);
setTestData(newTestData);
setTesting(true);
}
},[testing,rawData,weights,signals,startDate,endDate,maPeriod,bottomPosition,hs300ConfirmDays,bufferEnabled,signalOrder]);

const handleReplace=useCallback(()=>{
setShowConfirm(true);
},[]);

const handleConfirmReplace=useCallback(()=>{
const now=new Date();
const dateStr=now.toISOString().split('T')[0];
const name=strategyName.trim()||'V9.09';
const weightChanges=[];
if(weights.fwd5!==DEFAULT_WEIGHTS.fwd5)weightChanges.push(`5日权重从${DEFAULT_WEIGHTS.fwd5}%调整为${weights.fwd5}%`);
if(weights.fwd10!==DEFAULT_WEIGHTS.fwd10)weightChanges.push(`10日权重从${DEFAULT_WEIGHTS.fwd10}%调整为${weights.fwd10}%`);
if(weights.fwd20!==DEFAULT_WEIGHTS.fwd20)weightChanges.push(`20日权重从${DEFAULT_WEIGHTS.fwd20}%调整为${weights.fwd20}%`);
if(bottomPosition!==10)weightChanges.push(`底仓仓位从10%调整为${bottomPosition}%`);
if(hs300ConfirmDays!==1)weightChanges.push(`沪深300确认天数从1调整为${hs300ConfirmDays}`);
if(bufferEnabled)weightChanges.push(`启用满仓→底仓缓冲`);
if(maPeriod!==20)weightChanges.push(`MA周期从20调整为${maPeriod}`);
const disabledSignals=SIGNAL_DEFS.filter(s=>!signals[s.name].enabled);
if(disabledSignals.length>0)weightChanges.push(`禁用${disabledSignals.map(s=>s.name).join('、')}`);
const enabledSignals=SIGNAL_DEFS.filter(s=>signals[s.name].enabled&&s.defaultThreshold!==signals[s.name].threshold);
if(enabledSignals.length>0)weightChanges.push(`调整${enabledSignals.map(s=>s.name+'阈值→'+signals[s.name].threshold).join('、')}`);
const defaultOrderStr=DEFAULT_SIGNAL_ORDER.join(',');
const currentOrderStr=signalOrder.join(',');
if(defaultOrderStr!==currentOrderStr)weightChanges.push(`信号优先级已调整`);

const summary=weightChanges.length>0?weightChanges.join('；'):'参数未变化';

setLogs(prev=>prev.map(l=>({...l,status:'已停用'})).concat([{
version:name,effectiveDate:dateStr,paramSummary:summary,
replaceReason:`测试策略综合表现优于V9.08`,status:'运行中',note:''
}]));

setTesting(false);
setTestData([]);
setStrategyName('');
setWeights({...DEFAULT_WEIGHTS});
setSignals(JSON.parse(JSON.stringify(DEFAULT_SIGNALS)));
setBottomPosition(10);
setHs300ConfirmDays(1);
setBufferEnabled(false);
setMaPeriod(20);
setSignalOrder([...DEFAULT_SIGNAL_ORDER]);
setShowConfirm(false);
},[strategyName,weights,signals,bottomPosition,hs300ConfirmDays,bufferEnabled,maPeriod,signalOrder]);

const handleAddNote=useCallback((idx,note)=>{
setLogs(prev=>{
const next=[...prev];
next[idx]={...next[idx],note};
return next;
});
},[]);

const getApiBase=useCallback(()=>{
if(window.electronAPI&&window.electronAPI.startBackend){
const result=window.electronAPI.startBackend();
if(result&&result.port)return'http://localhost:'+result.port+'/api';
}
return'http://localhost:5001/api';
},[]);

const startBacktest=useCallback(async()=>{
setBtRunning(true);
setBtProgress(0);
setBtReport(null);
try{
const apiBase=getApiBase();
const resp=await fetch(apiBase+'/start-backtest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(btParams)});
const result=await resp.json();
if(result.success){
setBtTaskId(result.task_id);
pollBacktestStatus(result.task_id);
}else{
alert('启动回测失败');
setBtRunning(false);
}
}catch(e){
alert('请求失败: '+e.message);
setBtRunning(false);
}
},[btParams,getApiBase]);

const pollBacktestStatus=useCallback((taskId)=>{
const apiBase=getApiBase();
const poll=async()=>{
try{
const resp=await fetch(apiBase+'/backtest-status?task_id='+taskId);
const status=await resp.json();
if(status.status==='running'||status.status==='pending'){
setBtProgress(status.progress||0);
setTimeout(poll,500);
}else if(status.status==='done'){
setBtProgress(100);
setBtReport(status.report);
setBtRunning(false);
}else if(status.status==='error'){
alert('回测失败: '+status.message);
setBtRunning(false);
}
}catch(e){
setTimeout(poll,1000);
}
};
poll();
},[getApiBase]);

if(loading)return(
<div className="flex items-center justify-center h-screen">
<div className="text-center">
<div className="mx-auto mb-4" style={{width:40,height:40,border:'3px solid #1e293b',borderTopColor:'#3b82f6',borderRadius:'50%',animation:'spin 1s linear infinite'}}></div>
<div className="text-gray-400">加载数据中...</div>
</div>
</div>
);
if(error)return<div className="flex items-center justify-center h-screen text-red-400 text-lg">加载失败: {error}</div>;
if(!rawData||baselineData.length===0)return<div className="flex items-center justify-center h-screen text-gray-400 text-lg">无数据</div>;

return(
<div className="min-h-screen pb-8">
<Header onToggleBacktest={()=>setBacktestOpen(!backtestOpen)} backtestOpen={backtestOpen}/>
<div className="max-w-[1600px] mx-auto px-6 pt-6">
<div className="grid grid-cols-12 gap-6 mb-6">
<div className="col-span-3">
<ConfigPanel weights={weights} onWeightChange={handleWeightChange}
signals={signals} onSignalToggle={handleSignalToggle} onSignalThresholdChange={handleSignalThreshold}
strategyName={strategyName} onStrategyNameChange={setStrategyName}
testing={testing} onStartStop={handleStartStop}
canReplace={canReplace} onReplace={handleReplace}
startDate={startDate} onStartDateChange={setStartDate}
endDate={endDate} onEndDateChange={setEndDate}
bottomPosition={bottomPosition} onBottomPositionChange={setBottomPosition}
hs300ConfirmDays={hs300ConfirmDays} onHs300ConfirmDaysChange={setHs300ConfirmDays}
bufferEnabled={bufferEnabled} onBufferEnabledChange={setBufferEnabled}
maPeriod={maPeriod} onMaPeriodChange={setMaPeriod}
signalOrder={signalOrder} onSignalOrderChange={setSignalOrder}/>
</div>
<div className="col-span-9">
<CumulativeReturnChart baselineData={baselineData} testData={testData} testing={testing}/>
<AccuracyChart baselineData={baselineData} testData={testData} testing={testing}/>
</div>
</div>
<StrategyLog logs={logs} onAddNote={handleAddNote}/>
{backtestOpen&&<BacktestPanel params={btParams} onParamChange={setBtParams} running={btRunning} progress={btProgress} report={btReport} onStart={startBacktest}/>}
</div>
<ConfirmModal open={showConfirm} onConfirm={handleConfirmReplace} onCancel={()=>setShowConfirm(false)} strategyName={strategyName||'V9.09'}/>
</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
