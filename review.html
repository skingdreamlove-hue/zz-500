body{background:#0a0e17;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;min-width:1280px}

<script>window.addEventListener('load',function(){if(typeof React==='undefined'){document.body.innerHTML='<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#0a0e17;color:#e2e8f0;font-family:sans-serif;text-align:center"><div><h2 style="margin-bottom:12px">网络连接失败</h2><p style="color:#94a3b8">此页面需要在线加载依赖库，请检查网络连接后刷新</p></div></div>'}});</script>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo,useCallback,useRef,Fragment}=React;
const{AreaChart,Area,XAxis,YAxis,CartesianGrid,Tooltip,Legend,ResponsiveContainer,ComposedChart,Line,Bar,ReferenceArea,Cell}=Recharts;

const SIGNALS=[
{name:'清仓-跌破MA20',position:0,color:'#22c55e'},
{name:'满仓-涨破5%',position:100,color:'#ef4444'},
{name:'满仓-量价共振',position:100,color:'#ef4444'},
{name:'满仓-大盘撑腰',position:100,color:'#ef4444'},
{name:'底仓-逆市试错',position:10,color:'#f97316'},
{name:'观望-无效突破',position:0,color:'#6b7280'}
];
const SIGNAL_MAP={};
SIGNALS.forEach(s=>{SIGNAL_MAP[s.name]=s});

function getSignal(row){
const close=parseFloat(row.close);
const ma20=parseFloat(row.zz500_MA20);
const isHs300Strong=row.is_hs300_strong==='True';
const isVolumeSurge=row.is_volume_surge==='True';
if(close<ma20)return SIGNAL_MAP['清仓-跌破MA20'];
if(close>ma20*1.05)return SIGNAL_MAP['满仓-涨破5%'];
if(isHs300Strong&&isVolumeSurge)return SIGNAL_MAP['满仓-量价共振'];
if(isHs300Strong&&close>ma20*1.01)return SIGNAL_MAP['满仓-大盘撑腰'];
if(!isHs300Strong&&close>ma20*1.01)return SIGNAL_MAP['底仓-逆市试错'];
return SIGNAL_MAP['观望-无效突破'];
}

function processData(rawData){
const filtered=rawData.filter(r=>r.close&&r.close.trim()!==''&&r.zz500_MA20&&r.zz500_MA20.trim()!=='');
const data=filtered.map(r=>({...r,signal:getSignal(r)}));
let nav=1.0,benchNav=1.0,pos=0;
for(let i=0;i<data.length;i++){
const c=parseFloat(data[i].close);
const pc=i>0?parseFloat(data[i-1].close):c;
const sr=i>0?(c/pc-1):0;
const dr=pos*sr;
nav*=(1+dr);
benchNav*=(1+sr);
pos=data[i].signal.position/100;
data[i].nav=nav;
data[i].benchNav=benchNav;
data[i].sDR=dr*100;
data[i].bDR=sr*100;
data[i].excess=(dr-sr)*100;
data[i].chgPct=i>0?(c/pc-1)*100:0;
data[i].devMA20=(c-parseFloat(data[i].zz500_MA20))/parseFloat(data[i].zz500_MA20)*100;
data[i].isSwitch=i>0&&data[i].signal.name!==data[i-1].signal.name;
}
for(let i=0;i<data.length;i++){
const c=parseFloat(data[i].close);
data[i].fwd5=i+5<data.length?(parseFloat(data[i+5].close)/c-1):null;
data[i].fwd10=i+10<data.length?(parseFloat(data[i+10].close)/c-1):null;
data[i].fwd20=i+20<data.length?(parseFloat(data[i+20].close)/c-1):null;
}
return data;
}

function calcStats(data){
const last=data[data.length-1];
const first=data[0];
const totalDays=data.length;
const stratCumRet=(last.nav-1)*100;
const benchCumRet=(last.benchNav-1)*100;
const excessRet=stratCumRet-benchCumRet;

let stratPeak=0,stratMaxDD=0,benchPeak=0,benchMaxDD=0;
for(const r of data){
if(r.nav>stratPeak)stratPeak=r.nav;
const dd=(r.nav-stratPeak)/stratPeak;
if(dd<stratMaxDD)stratMaxDD=dd;
if(r.benchNav>benchPeak)benchPeak=r.benchNav;
const bdd=(r.benchNav-benchPeak)/benchPeak;
if(bdd<benchMaxDD)benchMaxDD=bdd;
}
stratMaxDD*=100;benchMaxDD*=100;
const ddCompress=benchMaxDD!==0?(1-Math.abs(stratMaxDD)/Math.abs(benchMaxDD))*100:0;

const years=totalDays/252;
const stratCAGR=(Math.pow(last.nav,1/years)-1)*100;
const benchCAGR=(Math.pow(last.benchNav,1/years)-1)*100;
const sDrs=data.map(r=>r.sDR/100);
const mean=sDrs.reduce((a,b)=>a+b,0)/sDrs.length;
const std=Math.sqrt(sDrs.reduce((a,b)=>a+(b-mean)**2,0)/sDrs.length);
const annVol=std*Math.sqrt(252)*100;
const sharpe=annVol>0?(stratCAGR-2)/annVol:0;

let fullDays=0,baseDays=0,emptyDays=0;
for(const r of data){
if(r.signal.position===100)fullDays++;
else if(r.signal.position===10)baseDays++;
else emptyDays++;
}
const posUtil={full:fullDays/totalDays*100,base:baseDays/totalDays*100,empty:emptyDays/totalDays*100};

const curSignalName=last.signal.name;
let consecDays=1;
for(let i=data.length-2;i>=0;i--){
if(data[i].signal.name===curSignalName)consecDays++;else break;
}
const episodes=[];
let epName=data[0].signal.name,epLen=1;
for(let i=1;i<=data.length;i++){
if(i<data.length&&data[i].signal.name===epName){epLen++}
else{episodes.push({name:epName,len:epLen});if(i<data.length){epName=data[i].signal.name;epLen=1}}
}
const curEpisodes=episodes.filter(e=>e.name===curSignalName);
const avgDur=curEpisodes.length>0?curEpisodes.reduce((s,e)=>s+e.len,0)/curEpisodes.length:0;

const lastDate=new Date(last.date);
const curMonth=lastDate.getMonth(),curYear=lastDate.getFullYear();
const monthSwitches=data.filter(r=>{const d=new Date(r.date);return d.getMonth()===curMonth&&d.getFullYear()===curYear&&r.isSwitch}).length;

const freqTable=SIGNALS.map(s=>{
const sEps=episodes.filter(e=>e.name===s.name);
const totalDays4Sig=data.filter(r=>r.signal.name===s.name).length;
const indepCount=sEps.length;
const avgD=sEps.length>0?sEps.reduce((a,e)=>a+e.len,0)/sEps.length:0;
const minD=sEps.length>0?Math.min(...sEps.map(e=>e.len)):0;
const maxD=sEps.length>0?Math.max(...sEps.map(e=>e.len)):0;
return{name:s.name,color:s.color,totalDays:totalDays4Sig,pct:totalDays4Sig/totalDays*100,indepCount,avgDur:avgD,minDur:minD,maxDur:maxD};
});

const quality={};
SIGNALS.forEach(s=>{
quality[s.name]={fwd5:{wins:0,total:0,sum:0,posSum:0,negSum:0,posCnt:0,negCnt:0},fwd10:{wins:0,total:0,sum:0,posSum:0,negSum:0,posCnt:0,negCnt:0},fwd20:{wins:0,total:0,sum:0,posSum:0,negSum:0,posCnt:0,negCnt:0}};
});
data.forEach(r=>{
['fwd5','fwd10','fwd20'].forEach(k=>{
if(r[k]!==null){
const q=quality[r.signal.name][k];
q.total++;q.sum+=r[k];
if(r[k]>0){q.wins++;q.posSum+=r[k];q.posCnt++}
else{q.negSum+=r[k];q.negCnt++}
}
});
});
const qualityMatrix=SIGNALS.map(s=>{
const row={name:s.name,color:s.color};
['fwd5','fwd10','fwd20'].forEach(k=>{
const q=quality[s.name][k];
const wr=q.total>0?q.wins/q.total*100:0;
const avgR=q.total>0?q.sum/q.total*100:0;
const plr=(q.posCnt>0&&q.negCnt>0)?(q.posSum/q.posCnt)/Math.abs(q.negSum/q.negCnt):0;
row[k]={winRate:wr,avgReturn:avgR,plRatio:plr,total:q.total};
});
return row;
});

const transMatrix={};
SIGNALS.forEach(s1=>{transMatrix[s1.name]={};SIGNALS.forEach(s2=>{transMatrix[s1.name][s2.name]=0})});
for(let i=1;i<data.length;i++){
const from=data[i-1].signal.name,to=data[i].signal.name;
transMatrix[from][to]++;
}

return{stratCumRet,benchCumRet,excessRet,stratMaxDD,benchMaxDD,ddCompress,stratCAGR,benchCAGR,sharpe,posUtil,curSignalName,consecDays,avgDur,monthSwitches,freqTable,qualityMatrix,transMatrix,episodes,lastRow:last};
}

function getNextSwitch(signal,close,ma20,isHs300Strong){
const m=ma20.toFixed(2);
const m101=(ma20*1.01).toFixed(2);
const m105=(ma20*1.05).toFixed(2);
switch(signal.name){
case'清仓-跌破MA20':return`涨破MA20(${m})→观望；涨破MA20×1.01(${m101})→${isHs300Strong?'满仓-大盘撑腰':'底仓-逆市试错'}`;
case'满仓-涨破5%':return`回落至MA20×1.05(${m105})以下→其他信号；跌破MA20(${m})→清仓`;
case'满仓-量价共振':return`量价消退→满仓-大盘撑腰或底仓；跌破MA20(${m})→清仓`;
case'满仓-大盘撑腰':return`涨破MA20×1.05(${m105})→涨破5%；沪深300转弱→底仓；跌破MA20×1.01(${m101})→观望/清仓`;
case'底仓-逆市试错':return`沪深300转强→满仓-大盘撑腰；跌破MA20×1.01(${m101})→观望；跌破MA20(${m})→清仓`;
case'观望-无效突破':return`涨破MA20×1.01(${m101})→${isHs300Strong?'满仓-大盘撑腰':'底仓-逆市试错'}；跌破MA20(${m})→清仓`;
default:return'';
}
}

function fmtPct(v,d=2){return(v>=0?'+':'')+v.toFixed(d)+'%'}
function fmtNum(v,d=2){return v.toFixed(d)}
function colorPct(v){return v>0?'text-red-400':v<0?'text-green-400':'text-gray-400'}

function DashboardCard({title,children}){
return(
<div className="bg-[#111827] border border-[#1e293b] rounded-lg p-4 flex flex-col">
<div className="text-gray-400 text-xs mb-3 uppercase tracking-wider">{title}</div>
<div className="flex-1 flex flex-col justify-center">{children}</div>
</div>
);
}

function SignalBadge({name,large}){
const s=SIGNAL_MAP[name];
if(!s)return null;
return(
<span className={`inline-block rounded px-2 py-0.5 font-medium ${large?'text-lg px-3 py-1':''}`} style={{backgroundColor:s.color+'22',color:s.color,border:`1px solid ${s.color}44`}}>
{name}
</span>
);
}

<div className="flex items-center justify-center h-screen">
<div className="text-center">
<div className="loader mx-auto mb-4"></div>
<div className="text-gray-400">加载数据中...</div>
</div>
</div>
);
}

return(
<div className="sticky top-0 z-50 bg-[#0a0e17]/95 backdrop-blur border-b border-[#1e293b] px-6 py-3 flex items-center justify-between">
<div className="flex items-center gap-4">
<a href="index.html" className="text-gray-400 hover:text-white text-sm flex items-center gap-1 transition-colors">

<h1 className="text-xl font-bold tracking-wide">中证500策略复盘</h1>

✨ Vibe-Trading
</button>

<a href="index.html" className="text-gray-500 hover:text-cyan-400 text-sm transition-colors">主页</a>

function StrategyDashboard({stats,data}){
const{stratCumRet,benchCumRet,excessRet,stratMaxDD,benchMaxDD,ddCompress,stratCAGR,benchCAGR,sharpe,posUtil,curSignalName,consecDays,avgDur,monthSwitches,lastRow}=stats;
const close=parseFloat(lastRow.close);
const ma20=parseFloat(lastRow.zz500_MA20);
const dev=((close-ma20)/ma20*100);
const isHs300Strong=lastRow.is_hs300_strong==='True';
const nextCond=getNextSwitch(SIGNAL_MAP[curSignalName],close,ma20,isHs300Strong);

return(
<div className="mb-8">
<div className="text-lg font-semibold mb-4 text-gray-300 border-b border-[#1e293b] pb-2">策略看板</div>
<div className="grid grid-cols-4 gap-4 mb-4">
<DashboardCard title="超额收益">
<div className="text-2xl font-bold text-white mb-1">{fmtPct(stratCumRet)}</div>
<div className="text-sm text-gray-400 mb-1">基准 {fmtPct(benchCumRet)}</div>
<div className={`text-sm font-medium ${excessRet>=0?'text-green-400':'text-red-400'}`}>
超额 {fmtPct(excessRet)} {excessRet>=0?'↑':'↓'}
</div>
</DashboardCard>

<DashboardCard title="回撤控制">
<div className="text-2xl font-bold text-white mb-1">{fmtPct(stratMaxDD)}</div>
<div className="text-sm text-gray-400 mb-1">基准 {fmtPct(benchMaxDD)}</div>
<div className={`text-sm font-medium ${ddCompress>=0?'text-green-400':'text-red-400'}`}>
压缩率 {fmtPct(ddCompress)}
</div>
</DashboardCard>

<DashboardCard title="年化与夏普">
<div className="text-2xl font-bold text-white mb-1">{fmtNum(stratCAGR)}%</div>
<div className="text-sm text-gray-400 mb-1">基准 {fmtNum(benchCAGR)}%</div>
<div className="text-sm font-medium text-blue-400">夏普 {fmtNum(sharpe)}</div>
</DashboardCard>

<DashboardCard title="仓位利用率">
<div className="flex h-6 rounded overflow-hidden mb-2">
<div style={{width:posUtil.full+'%',backgroundColor:'#ef4444'}} className="flex items-center justify-center text-xs text-white font-medium">{posUtil.full>8?fmtNum(posUtil.full,0)+'%':''}</div>
<div style={{width:posUtil.base+'%',backgroundColor:'#f97316'}} className="flex items-center justify-center text-xs text-white font-medium">{posUtil.base>5?fmtNum(posUtil.base,0)+'%':''}</div>
<div style={{width:posUtil.empty+'%',backgroundColor:'#22c55e'}} className="flex items-center justify-center text-xs text-white font-medium">{posUtil.empty>5?fmtNum(posUtil.empty,0)+'%':''}</div>
</div>
<div className="flex gap-4 text-xs">
<span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-red-500"></span>满仓 {fmtNum(posUtil.full,1)}%</span>
<span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-orange-500"></span>底仓 {fmtNum(posUtil.base,1)}%</span>
<span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-green-500"></span>空仓 {fmtNum(posUtil.empty,1)}%</span>
</div>
</DashboardCard>
</div>

<div className="grid grid-cols-4 gap-4">
<DashboardCard title="今日信号">
<div className="mb-2"><SignalBadge name={curSignalName} large/></div>
<div className="grid grid-cols-3 gap-2 text-xs">
<div><span className="text-gray-500">收盘</span><div className="text-white font-medium">{close.toFixed(2)}</div></div>
<div><span className="text-gray-500">MA20</span><div className="text-white font-medium">{ma20.toFixed(2)}</div></div>
<div><span className="text-gray-500">偏离</span><div className={`font-medium ${dev>=0?'text-red-400':'text-green-400'}`}>{fmtPct(dev)}</div></div>
</div>
</DashboardCard>

<DashboardCard title="信号已持续">
<div className="text-3xl font-bold text-white mb-1">{consecDays}<span className="text-base text-gray-400 ml-1">天</span></div>
<div className="text-sm text-gray-400">历史平均 <span className="text-white font-medium">{fmtNum(avgDur,1)}</span> 天</div>
</DashboardCard>

<DashboardCard title="本月切换次数">
<div className="text-3xl font-bold text-white">{monthSwitches}<span className="text-base text-gray-400 ml-1">次</span></div>
</DashboardCard>

<DashboardCard title="下一个切换条件">
<div className="text-sm text-gray-300 leading-relaxed">{nextCond}</div>
</DashboardCard>
</div>
</div>
);
}

function SignalFrequencyTable({freqTable}){
return(
<div className="mb-6">
<div className="text-base font-semibold mb-3 text-gray-300">各信号触发频次</div>
<div className="overflow-x-auto">
<table className="w-full text-sm">
<thead>
<tr className="border-b border-[#1e293b]">
<th className="text-left py-2 px-3 text-gray-400 font-medium">信号</th>
<th className="text-right py-2 px-3 text-gray-400 font-medium">触发总天数</th>
<th className="text-right py-2 px-3 text-gray-400 font-medium">占比</th>
<th className="text-right py-2 px-3 text-gray-400 font-medium">独立触发次数</th>
<th className="text-right py-2 px-3 text-gray-400 font-medium">平均持续</th>
<th className="text-right py-2 px-3 text-gray-400 font-medium">最短持续</th>
<th className="text-right py-2 px-3 text-gray-400 font-medium">最长持续</th>
</tr>
</thead>
<tbody>
{freqTable.map(r=>(
<tr key={r.name} className="border-b border-[#1e293b]/50 hover:bg-[#111827]">
<td className="py-2 px-3">
<span className="inline-block w-2 h-2 rounded-full mr-2" style={{backgroundColor:r.color}}></span>
<span style={{color:r.color}}>{r.name}</span>
{r.name==='满仓-量价共振'&&<span className="ml-2 text-xs text-yellow-500">⚠ 样本偏少，参考意义有限</span>}
</td>
<td className="text-right py-2 px-3 text-white">{r.totalDays}</td>
<td className="text-right py-2 px-3 text-gray-300">{fmtNum(r.pct,1)}%</td>
<td className="text-right py-2 px-3 text-white">{r.indepCount}</td>
<td className="text-right py-2 px-3 text-gray-300">{fmtNum(r.avgDur,1)}</td>
<td className="text-right py-2 px-3 text-gray-300">{r.minDur}</td>
<td className="text-right py-2 px-3 text-gray-300">{r.maxDur}</td>
</tr>
))}
</tbody>
</table>
</div>
</div>
);
}

function QualityCell({data,signalName,horizon}){
if(!data||data.total===0)return<td className="py-2 px-3 text-center text-gray-600">—</td>;
const wr=data.winRate;
const annFactor=horizon==='fwd5'?50.4:horizon==='fwd10'?25.2:12.6;
const vbr=data.avgReturn*annFactor;
let bg='bg-red-900/30';
if(vbr>0)bg='bg-green-900/30';
else if(vbr>=-5)bg='bg-yellow-900/30';
const isWarn=signalName==='满仓-涨破5%'&&horizon==='fwd20';
return(
<td className={`py-2 px-3 text-center ${bg} ${isWarn?'border-2 border-red-500 relative':''}`}>
{isWarn&&<span className="absolute -top-2 -right-2 text-red-500 text-sm font-bold">!</span>}

function SignalTransitionMatrix({transMatrix}){
const names=SIGNALS.map(s=>s.name);
const shortNames=['清仓','涨破5%','量价共振','大盘撑腰','逆市试错','观望'];
const[hov,setHov]=useState(null);
let maxVal=0;
names.forEach(n1=>names.forEach(n2=>{if(transMatrix[n1][n2]>maxVal)maxVal=transMatrix[n1][n2]}));

return(
<div className="mb-6">
<div className="text-base font-semibold mb-3 text-gray-300">信号转换矩阵</div>

))}
</tr>
</thead>
<tbody>
{names.map((n1,i)=>(
<tr key={n1} className="border-b border-[#1e293b]/50">
<td className="py-2 px-2 text-gray-400 font-medium whitespace-nowrap" style={{color:SIGNALS[i].color}}>{shortNames[i]}</td>
{names.map((n2,j)=>{
const v=transMatrix[n1][n2];
const isDiag=i===j;
const intensity=maxVal>0?v/maxVal:0;
const bg=isDiag
?`rgba(59,130,246,${0.1+intensity*0.5})`
:`rgba(255,255,255,${0.02+intensity*0.25})`;
const totalRow=names.reduce((s,n)=>s+transMatrix[n1][n],0);
const pct=totalRow>0?(v/totalRow*100).toFixed(1):'0.0';
return(
<td key={n2} className="py-2 px-2 text-center heatmap-cell" style={{backgroundColor:bg,minWidth:60,minHeight:36}}
onMouseEnter={()=>setHov(`${i}-${j}`)} onMouseLeave={()=>setHov(null)}>
<span className="text-white font-medium">{v}</span>
{hov===`${i}-${j}`&&(
<div className="tooltip-box">
<div>{shortNames[i]} → {shortNames[j]}</div>
<div>次数: {v} ({pct}%)</div>
</div>
)}
</td>
);
})}
</tr>
))}
</tbody>
</table>
</div>
</div>
);
}

function DailyRecords({data,stats}){
const lastDate=new Date(data[data.length-1].date);
const[signalFilter,setSignalFilter]=useState(SIGNALS.map(s=>s.name));
const[timeRange,setTimeRange]=useState('90d');
const[switchOnly,setSwitchOnly]=useState(false);
const[sortCol,setSortCol]=useState('date');
const[sortDir,setSortDir]=useState('desc');
const[page,setPage]=useState(1);
const pageSize=30;

const toggleSignal=useCallback(name=>{
setSignalFilter(prev=>prev.includes(name)?prev.filter(n=>n!==name):[...prev,name]);
},[]);

const filtered=useMemo(()=>{
let d=data;
if(signalFilter.length<SIGNALS.length){
d=d.filter(r=>signalFilter.includes(r.signal.name));
}
if(timeRange!=='all'){
const cutoff=new Date(lastDate);
if(timeRange==='month')cutoff.setMonth(cutoff.getMonth()-1);
else if(timeRange==='quarter')cutoff.setMonth(cutoff.getMonth()-3);
else if(timeRange==='90d')cutoff.setDate(cutoff.getDate()-90);
else if(timeRange==='year')cutoff.setFullYear(cutoff.getFullYear()-1);
d=d.filter(r=>new Date(r.date)>=cutoff);
}
if(switchOnly)d=d.filter(r=>r.isSwitch);
return d;
},[data,signalFilter,timeRange,switchOnly,lastDate]);

const sorted=useMemo(()=>{
const arr=[...filtered];
const dir=sortDir==='asc'?1:-1;
arr.sort((a,b)=>{
let va,vb;
switch(sortCol){
case'date':va=a.date;vb=b.date;break;
case'close':va=parseFloat(a.close);vb=parseFloat(b.close);break;
case'chgPct':va=a.chgPct;vb=b.chgPct;break;
case'ma20':va=parseFloat(a.zz500_MA20);vb=parseFloat(b.zz500_MA20);break;
case'devMA20':va=a.devMA20;vb=b.devMA20;break;
case'hs300':va=a.is_hs300_strong;vb=b.is_hs300_strong;break;
case'volSurge':va=a.is_volume_surge;vb=b.is_volume_surge;break;
case'signal':va=a.signal.name;vb=b.signal.name;break;
case'isSwitch':va=a.isSwitch?1:0;vb=b.isSwitch?1:0;break;
case'position':va=a.signal.position;vb=b.signal.position;break;
case'sDR':va=a.sDR;vb=b.sDR;break;
case'bDR':va=a.bDR;vb=b.bDR;break;
case'excess':va=a.excess;vb=b.excess;break;
case'nav':va=a.nav;vb=b.nav;break;
default:va=a.date;vb=b.date;
}
if(va<vb)return-1*dir;
if(va>vb)return 1*dir;
return 0;
});
return arr;
},[filtered,sortCol,sortDir]);

const totalPages=Math.ceil(sorted.length/pageSize);
const paged=sorted.slice((page-1)*pageSize,page*pageSize);

const handleSort=useCallback(col=>{
if(sortCol===col)setSortDir(d=>d==='asc'?'desc':'asc');
else{setSortCol(col);setSortDir('desc')}
setPage(1);
},[sortCol]);

const exportCSV=useCallback(()=>{
const rows=sorted.map(r=>({
'日期':r.date,'收盘价':parseFloat(r.close).toFixed(2),'涨跌幅':fmtPct(r.chgPct),

'基准日收益率':fmtPct(r.bDR),'当日超额':fmtPct(r.excess),
'策略累计净值':r.nav.toFixed(4)
}));
const csv=Papa.unparse(rows);
const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});

setMessages([]);
setRouteHint(null);
setConfirmRoute(null);
fetch(apiBase+'/vibe/quota').then(r=>r.json()).then(d=>{if(d.success)setQuota(d.models)}).catch(()=>{});
},[open]);

useEffect(()=>{
messagesEndRef.current?.scrollIntoView({behavior:'smooth'});
},[messages]);

useEffect(()=>{
if(!input.trim()){
setRouteHint(null);
return;
}
const route=detectRoute(input);
setRouteHint(route);
},[input]);

function buildContext(){
if(!data||!stats)return'';
const last=data[data.length-1];
const recent=data.slice(-20).map(d=>`${d.date} 收盘:${d.close} 信号:${d.signal?.name||'--'}`).join('\n');
return`\n\n附：当前中证500策略实时数据供参考——\n最新日期: ${last.date}\n最新收盘: ${last.close}\n当前信号: ${stats.curSignalName}\n策略累计收益: ${(stats.stratCumRet*100).toFixed(2)}%\n基准累计收益: ${(stats.benchCumRet*100).toFixed(2)}%\n超额收益: ${(stats.excessRet*100).toFixed(2)}%\n最大回撤: ${(stats.stratMaxDD*100).toFixed(2)}%\n夏普比率: ${stats.sharpe?.toFixed(2)||'--'}\n近20日记录:\n${recent}`;
}

async function executeChat(text){
const userMsg={role:'user',content:text};
setMessages(prev=>[...prev,userMsg]);
setInput('');
setRouteHint(null);
setConfirmRoute(null);
setLoading(true);
try{
const fullPrompt=text+buildContext();
const resp=await fetch(apiBase+'/ai-analysis',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({prompt:fullPrompt,max_iter:30})
});
const result=await resp.json();
if(result.success){
const runTag=result.run_id?`\n\n[Run ID: ${result.run_id}]`:'';
setMessages(prev=>[...prev,{role:'assistant',content:result.answer+runTag,route:'chat'}]);
}else{
setMessages(prev=>[...prev,{role:'assistant',content:'分析失败: '+(result.error||'未知错误'),route:'chat'}]);
}
}catch(e){
setMessages(prev=>[...prev,{role:'assistant',content:'请求失败: '+e.message,route:'chat'}]);
}finally{
setLoading(false);
}
}

async function executeStrategy(text){
const userMsg={role:'user',content:text};
setMessages(prev=>[...prev,userMsg]);
setInput('');
setRouteHint(null);
setConfirmRoute(null);
setLoading(true);
setMessages(prev=>[...prev,{role:'system',content:'🔬 正在使用 strategy-generate 技能生成策略并回测，预计1-5分钟...'}]);
try{
const resp=await fetch(apiBase+'/vibe/strategy',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({description:text,codes:['000905.SH']})
});
const result=await resp.json();
if(result.success){
let content='✅ 策略回测完成';
if(result.answer)content+='\n\n'+result.answer;
if(result.metrics)content+='\n\n📊 回测指标:\n'+result.metrics;
if(result.code&&Object.keys(result.code).length>0){
content+='\n\n📝 生成代码:';
for(const[fname,code]of Object.entries(result.code)){
content+='\n--- '+fname+' ---\n'+code;
}
}
if(result.artifacts&&result.artifacts.length>0){
content+='\n\n📁 产出文件: '+result.artifacts.join(', ');
}
content+='\n\n[Run ID: '+result.run_id+']';
setMessages(prev=>[...prev,{role:'assistant',content:content,route:'strategy'}]);
}else{
setMessages(prev=>[...prev,{role:'assistant',content:'❌ 回测失败: '+(result.error||'未知错误'),route:'strategy'}]);
}
}catch(e){
setMessages(prev=>[...prev,{role:'assistant',content:'请求失败: '+e.message,route:'strategy'}]);
}finally{
setLoading(false);
}
}

async function executeSwarm(text,preset){
const userMsg={role:'user',content:text};
setMessages(prev=>[...prev,userMsg]);
setInput('');
setRouteHint(null);
setConfirmRoute(null);
setLoading(true);
setMessages(prev=>[...prev,{role:'system',content:`🐝 正在启动 ${preset} Swarm团队，多Agent协作中，预计3-10分钟...`}]);
try{
const resp=await fetch(apiBase+'/vibe/swarm',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({preset:preset,variables:{market:'A股',goal:text}})
});
const result=await resp.json();
if(result.success){
setMessages(prev=>[...prev,{role:'assistant',content:'✅ Swarm团队执行完成\n\n'+result.output,route:'swarm'}]);
}else{
setMessages(prev=>[...prev,{role:'assistant',content:'❌ 执行失败: '+(result.error||'未知错误'),route:'swarm'}]);
}
}catch(e){
setMessages(prev=>[...prev,{role:'assistant',content:'请求失败: '+e.message,route:'swarm'}]);
}finally{
setLoading(false);
}
}

function handleSubmit(forceType){
const text=input.trim();
if(!text||loading)return;
const route=routeHint||detectRoute(text);
const finalType=forceType||route.type;
if(finalType==='strategy'){
executeStrategy(text);
}else if(finalType==='swarm'){
executeSwarm(text,route.preset);
}else{
executeChat(text);
}
}

function handleQuickAction(action){
if(loading)return;
if(action.type==='chat'){
executeChat(action.prompt);
}else if(action.type==='strategy'){
executeStrategy(action.prompt);
}else if(action.type==='swarm'){
setConfirmRoute({type:'swarm',preset:action.preset,label:action.label,cost:action.cost,prompt:action.prompt});
}
}

if(!open)return null;

const quickActions=[
{label:'📊 策略诊断',type:'chat',prompt:'请使用 technical-basic 和 risk-analysis 技能，分析当前中证500策略的表现，指出优缺点和改进建议'},
{label:'🔮 趋势预判',type:'chat',prompt:'请使用 technical-basic 和 sentiment-analysis 技能，基于当前市场数据和技术指标，分析中证500短期走势'},
{label:'⚡ 信号复盘',type:'chat',prompt:'请使用 backtest-diagnose 技能，复盘最近20个交易日的信号决策，是否有更好的操作方式'},
{label:'📐 缠论分析',type:'chat',prompt:'请使用 chanlun 技能，用缠论方法分析中证500当前的笔、线段和中枢结构'},
{label:'🌊 波浪分析',type:'chat',prompt:'请使用 elliott-wave 技能，用艾略特波浪理论分析中证500当前处于哪个浪型'},
{label:'🛡️ 风控审计',type:'swarm',preset:'risk_committee',label:'🐝 风控委员会',cost:'3-10分钟，约5-10次配额',prompt:'中证500六因子决策树策略的全面风险审计'},
{label:'🔬 策略回测',type:'strategy',prompt:'中证500指数MA20均线策略，收盘价站上MA20满仓，跌破MA20清仓'}
];

return(
<div className="fixed inset-0 z-[100] flex items-center justify-center" style={{background:'rgba(0,0,0,0.6)'}}>
<div className="w-[900px] max-h-[90vh] bg-[#111827] border border-[#1e293b] rounded-2xl flex flex-col overflow-hidden" style={{boxShadow:'0 25px 50px rgba(0,0,0,0.5)'}}>
<div className="flex items-center justify-between px-6 py-4 border-b border-[#1e293b]">
<div className="flex items-center gap-3">
<div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:'linear-gradient(135deg,#8b5cf6,#6d28d9)'}}>
<span className="text-white text-sm">✨</span>
</div>
<div>
<div className="text-white font-semibold">Vibe-Trading 智能分析</div>
<div className="text-gray-500 text-xs">输入问题，自动选择最优分析方式
{quota&&<span className="ml-2 text-gray-600">| {quota.map(q=><span key={q.model} className="mr-1">{q.model.replace('gemini-','')}:{q.rpm_remaining}/5</span>)}</span>}
</div>
</div>
</div>
<button onClick={onClose} className="text-gray-500 hover:text-white transition-colors text-xl">✕</button>
</div>

<div className="flex gap-2 px-6 py-3 border-b border-[#1e293b] overflow-x-auto">
{quickActions.map((q,i)=>(
<button key={i} onClick={()=>handleQuickAction(q)} disabled={loading}
className="px-3 py-1.5 rounded-lg text-xs font-medium border border-[#1e293b] text-gray-400 hover:text-white hover:border-purple-500/50 transition-all disabled:opacity-30 disabled:cursor-not-allowed whitespace-nowrap">
{q.label}
</button>
))}
</div>

<div className="flex-1 overflow-y-auto px-6 py-4" style={{minHeight:'300px',maxHeight:'55vh'}}>
<div className="space-y-4">
{messages.length===0&&(
<div className="text-center text-gray-500 text-sm py-8">
直接输入你的问题，系统会自动判断分析方式<br/>
<span className="text-gray-600 text-xs mt-2 block">💬 简单问题 → AI对话（30秒） | 🔬 策略需求 → 自动回测（1-5分钟） | 🐝 深度分析 → Swarm团队（3-10分钟）</span>
</div>
)}
{messages.map((msg,i)=>(
<div key={i} className={`flex ${msg.role==='user'?'justify-end':'justify-start'}`}>
<div className={`max-w-[90%] rounded-xl px-4 py-3 text-sm leading-relaxed ${
msg.role==='user'
?'bg-purple-600/20 text-purple-200 border border-purple-500/20'
:msg.role==='system'
?'bg-blue-900/20 text-blue-300 border border-blue-500/20'
:msg.route==='strategy'
?'bg-emerald-900/20 text-emerald-200 border border-emerald-500/20'
:msg.route==='swarm'
?'bg-amber-900/20 text-amber-200 border border-amber-500/20'
:'bg-[#1e293b] text-gray-200 border border-[#334155]'
}`}>
{msg.route&&msg.role==='assistant'&&<div className="text-xs opacity-50 mb-1">{msg.route==='strategy'?'🔬 策略回测':msg.route==='swarm'?'🐝 Swarm团队':'💬 AI对话'}</div>}
<div style={{whiteSpace:'pre-wrap'}}>{msg.content}</div>
</div>
</div>
))}
{loading&&(
<div className="flex justify-start">
<div className="bg-[#1e293b] rounded-xl px-4 py-3 text-gray-400 text-sm border border-[#334155]">
<div className="flex items-center gap-2">
<div className="loader" style={{width:'14px',height:'14px',borderWidth:'2px'}}></div>
Vibe-Trading分析中...
</div>
</div>
</div>
)}
<div ref={messagesEndRef}/>
</div>
</div>

{confirmRoute&&(
<div className="px-6 py-3 border-t border-amber-500/30 bg-amber-900/10">
<div className="flex items-center justify-between">
<div className="flex items-center gap-3">
<span className="text-amber-400 text-lg">{confirmRoute.label.split(' ')[0]}</span>
<div>
<div className="text-amber-200 text-sm font-medium">检测到深度分析需求，推荐启动 {confirmRoute.label}</div>
<div className="text-amber-400/60 text-xs">预计耗时 {confirmRoute.cost}，确认启动？</div>
</div>
</div>
<div className="flex gap-2">
<button onClick={()=>{executeSwarm(confirmRoute.prompt||input,confirmRoute.preset);setConfirmRoute(null);}}
className="px-4 py-1.5 rounded-lg text-sm font-medium text-white"
style={{background:'linear-gradient(135deg,#8b5cf6,#6d28d9)'}}>
启动
</button>
<button onClick={()=>{
setConfirmRoute(null);
executeChat(input.trim());
}}
className="px-4 py-1.5 rounded-lg text-sm font-medium text-gray-400 border border-[#334155] hover:text-white">
改为快速对话
</button>
<button onClick={()=>setConfirmRoute(null)}
className="px-4 py-1.5 rounded-lg text-sm font-medium text-gray-500 hover:text-white">
取消
</button>
</div>
</div>
</div>
)}

{routeHint&&!confirmRoute&&(
<div className="px-6 py-2 border-t border-[#1e293b] bg-[#0d1117]">
<div className="flex items-center gap-2">
<span className="text-gray-500 text-xs">💡 检测到:</span>
<span className={`text-xs font-medium ${routeHint.type==='chat'?'text-blue-400':routeHint.type==='strategy'?'text-emerald-400':'text-amber-400'}`}>
{routeHint.label}
</span>
<span className="text-gray-600 text-xs">({routeHint.cost})</span>
{routeHint.type!=='chat'&&<span className="text-gray-600 text-xs">· 按Enter确认，或点击"改为对话"走快速通道</span>}
</div>
</div>
)}

<div className="px-6 py-4 border-t border-[#1e293b]">
<div className="flex gap-2">
<input
value={input}
onChange={e=>setInput(e.target.value)}
onKeyDown={e=>{
if(e.key==='Enter'&&!e.shiftKey){
e.preventDefault();
if(loading)return;
const text=input.trim();
if(!text)return;
const route=routeHint||detectRoute(text);
if(route.type==='swarm'){
setConfirmRoute({...route,prompt:text});
}else{
handleSubmit();
}
}
}}
placeholder="输入任何问题，如：我的策略风险大不大？帮我写个RSI策略..."
disabled={loading}
className="flex-1 bg-[#0a0e17] border border-[#1e293b] rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-purple-500/50 disabled:opacity-50"
/>
<button onClick={()=>handleSubmit()} disabled={loading||!input.trim()}
className="px-5 py-2.5 rounded-lg text-sm font-semibold text-white transition-all disabled:opacity-30"
style={{background:'linear-gradient(135deg,#8b5cf6,#6d28d9)'}}>
发送
</button>
</div>
</div>
</div>
</div>
);
}

function App(){
const[data,setData]=useState(null);
const[loading,setLoading]=useState(true);
const[error,setError]=useState(null);
const[aiOpen,setAiOpen]=useState(false);

const loadCSV=useCallback(async()=>{
let csvText;
if(window.electronAPI&&window.electronAPI.readFile){
csvText=await window.electronAPI.readFile('zz500_factors.csv');
}else{
const resp=await fetch('./zz500_factors.csv');
csvText=await resp.text();
}
const parsed=Papa.parse(csvText,{header:true,skipEmptyLines:true});
const processed=processData(parsed.data);
setData(processed);
return processed;
},[]);

useEffect(()=>{
(async()=>{
try{
await loadCSV();
}catch(e){setError(e.message)}finally{setLoading(false)}
})();
},[loadCSV]);

useEffect(()=>{
const onVisible=()=>{
if(document.visibilityState==='visible'&&data){
loadCSV().catch(()=>{});
}
};
document.addEventListener('visibilitychange',onVisible);
return()=>document.removeEventListener('visibilitychange',onVisible);
},[data,loadCSV]);

if(loading)return<LoadingScreen/>;
if(error)return<div className="flex items-center justify-center h-screen text-red-400 text-lg">加载失败: {error}</div>;
if(!data||data.length===0)return<div className="flex items-center justify-center h-screen text-gray-400 text-lg">无数据</div>;

const stats=calcStats(data);
const lastDate=data[data.length-1].date;

return(
<div className="min-h-screen pb-8">
<Header lastDate={lastDate} onAIAnalysis={()=>setAiOpen(true)}/>
<div className="max-w-[1600px] mx-auto px-6 pt-6">
<StrategyDashboard stats={stats} data={data}/>
<SignalStatistics stats={stats} data={data}/>
<DailyRecords data={data} stats={stats}/>
</div>
<AIAnalysisModal open={aiOpen} onClose={()=>setAiOpen(false)} data={data} stats={stats}/>
</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
